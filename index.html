  <script type="importmap">
  { "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.183.2/build/three.module.js", "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.183.2/examples/jsm/" } }
  </script>

  <script type="module">
  import * as THREE from 'three';
  import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

  // === Three.js 씬 셋업 ===
  const container = document.getElementById('viewport');
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0d1117);

  const camera = new THREE.PerspectiveCamera(45, innerWidth / innerHeight, 0.1, 1000);
  camera.position.set(0, 0, 8);
  camera.lookAt(0, 0, 0);

  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(innerWidth, innerHeight);
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  container.appendChild(renderer.domElement);

  const controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;

  scene.add(new THREE.AmbientLight(0xffffff, 0.6));
  const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
  dirLight.position.set(5, 10, 7);
  scene.add(dirLight);

  window.addEventListener('resize', () => {
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
  });

  function animate() {
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
  }
  animate();

  // === 콘솔 출력 ===
  const consoleEl = document.getElementById('console');
  function logToConsole(text) {
    consoleEl.classList.add('visible');
    const line = document.createElement('div');
    line.textContent = text;
    consoleEl.appendChild(line);
    consoleEl.scrollTop = consoleEl.scrollHeight;
  }

  // === 사운드 시스템 (Web Audio API) ===
  let audioCtx = null;
  let audioUnlocked = false;
  let audioUnlockPending = null;
  let iosMediaUnlocked = false;
  let iosMediaUnlockPending = null;
  let silentMediaDataUri = null;
  function getAudioCtx() {
    const AudioContextClass = window.AudioContext || window.webkitAudioContext;
    if (!AudioContextClass) return null;
    if (!audioCtx) audioCtx = new AudioContextClass();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    return audioCtx;
  }
  function isIOSDevice() {
    const ua = navigator.userAgent || '';
    const platform = navigator.platform || '';
    const touchPoints = navigator.maxTouchPoints || 0;
    return /iPad|iPhone|iPod/.test(ua) || (platform === 'MacIntel' && touchPoints > 1);
  }
  function writeWavString(view, offset, value) {
    for (let i = 0; i < value.length; i++) view.setUint8(offset + i, value.charCodeAt(i));
  }
  function getSilentMediaDataUri() {
    if (silentMediaDataUri) return silentMediaDataUri;
    const sampleRate = 8000;
    const durationSeconds = 0.2;
    const sampleCount = Math.floor(sampleRate * durationSeconds);
    const dataSize = sampleCount * 2;
    const buffer = new ArrayBuffer(44 + dataSize);
    const view = new DataView(buffer);
    writeWavString(view, 0, 'RIFF');
    view.setUint32(4, 36 + dataSize, true);
    writeWavString(view, 8, 'WAVE');
    writeWavString(view, 12, 'fmt ');
    view.setUint32(16, 16, true);
    view.setUint16(20, 1, true);
    view.setUint16(22, 1, true);
    view.setUint32(24, sampleRate, true);
    view.setUint32(28, sampleRate * 2, true);
    view.setUint16(32, 2, true);
    view.setUint16(34, 16, true);
    writeWavString(view, 36, 'data');
    view.setUint32(40, dataSize, true);
    const bytes = new Uint8Array(buffer);
    let binary = '';
    for (let i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
    silentMediaDataUri = 'data:audio/wav;base64,' + btoa(binary);
    return silentMediaDataUri;
  }
  function playSilentUnlockBuffer(ctx) {
    try {
      const b = ctx.createBuffer(1, 1, 22050);
      const s = ctx.createBufferSource();
      s.buffer = b;
      s.connect(ctx.destination);
      s.start(0);
    } catch (_) {}
  }
  async function ensureIOSMediaPlayback() {
    if (!isIOSDevice()) return true;
    if (iosMediaUnlocked) return true;
    if (!iosMediaUnlockPending) {
      iosMediaUnlockPending = (async () => {
        try {
          const audio = document.createElement('audio');
          audio.src = getSilentMediaDataUri();
          audio.preload = 'auto';
          audio.playsInline = true;
          audio.setAttribute('playsinline', '');
          audio.setAttribute('webkit-playsinline', '');
          await audio.play();
          iosMediaUnlocked = true;
        } catch (_) {}
        return iosMediaUnlocked;
      })().finally(() => { iosMediaUnlockPending = null; });
    }
    return iosMediaUnlockPending;
  }
  async function ensureAudioReady() {
    const ctx = getAudioCtx();
    if (!ctx) return false;
    const iosReadyPromise = ensureIOSMediaPlayback();
    if (ctx.state === 'running') {
      audioUnlocked = true;
      const iosReady = await iosReadyPromise;
      return isIOSDevice() ? iosReady : true;
    }
    if (!audioUnlockPending) {
      audioUnlockPending = (async () => {
        try { await ctx.resume(); } catch (_) {}
        playSilentUnlockBuffer(ctx);
        const iosReady = await iosReadyPromise;
        if (ctx.state === 'running') audioUnlocked = true;
        return isIOSDevice() ? (ctx.state === 'running' && iosReady) : ctx.state === 'running';
      })().finally(() => { audioUnlockPending = null; });
    }
    return audioUnlockPending;
  }
  // 모바일 오디오 잠금 해제 (iOS Safari 등)
  (function initAudioGesture() {
    const evts = ['pointerdown','touchstart','touchend','click','keydown'];
    const unlock = () => {
      if (audioUnlocked) return;
      ensureAudioReady().then((ready) => {
        if (ready) evts.forEach(e => document.removeEventListener(e, unlock, true));
      }).catch(() => {});
    };
    evts.forEach(e=>document.addEventListener(e,unlock,true));
  })();

  function beep(frequency = 440, duration = 0.3, type = 'sine', volume = 0.3) {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = type;
    osc.frequency.value = frequency;
    gain.gain.setValueAtTime(volume, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + duration);
  }

  // 노트 이름 → 주파수
  const NOTE_NAMES = {
    'C':0,'C#':1,'Db':1,'D':2,'D#':3,'Eb':3,'E':4,'Fb':4,
    'F':5,'F#':6,'Gb':6,'G':7,'G#':8,'Ab':8,'A':9,'A#':10,'Bb':10,'B':11,'Cb':11
  };
  function noteToFreq(name) {
    if (!name || name.length < 2) return null;
    let notePart, octave;
    if (name.length >= 3 && (name[1] === '#' || name[1] === 'b')) {
      notePart = name.slice(0, 2); octave = parseInt(name.slice(2), 10);
    } else {
      notePart = name[0]; octave = parseInt(name.slice(1), 10);
    }
    const semitone = NOTE_NAMES[notePart];
    if (semitone === undefined || isNaN(octave)) return null;
    return 440 * Math.pow(2, ((octave - 4) * 12 + (semitone - 9)) / 12);
  }

  function playNote(name, duration, type, volume) {
    const freq = noteToFreq(name);
    if (freq) beep(freq, duration || 0.5, type || 'sine', volume || 0.4);
  }

  function playChord(frequencies, duration, type, volume) {
    if (!frequencies) return;
    for (const freq of frequencies) beep(freq, duration || 1.0, type || 'sine', volume || 0.25);
  }

  function playSequence(notes) {
    if (!notes) return;
    let delay = 0;
    for (const n of notes) {
      if (delay === 0) beep(n.freq, n.duration, n.type||'sine', n.volume||0.4);
      else { const d = delay; setTimeout(() => beep(n.freq, n.duration, n.type||'sine', n.volume||0.4), d); }
      delay += n.duration * 1000;
    }
  }

  // SFX 함수들
  function sfxJump() { const c=getAudioCtx(),o=c.createOscillator(),g=c.createGain(); o.type='square'; o.frequency.setValueAtTime(300,c.currentTime); o.frequency.exponentialRampToValueAtTime(600,c.currentTime+0.15); g.gain.setValueAtTime(0.2,c.currentTime); g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.2); o.connect(g); g.connect(c.destination); o.start(c.currentTime); o.stop(c.currentTime+0.2); }
  function sfxCoin() { beep(988,0.06,'square',0.2); setTimeout(()=>beep(1319,0.12,'square',0.2),60); }
  function sfxPowerUp() { [523,659,784,988,1175,1319].forEach((f,i)=>setTimeout(()=>beep(f,0.08,'square',0.15),i*50)); }
  function sfxDeath() { [494,466,440,370,311,247].forEach((f,i)=>setTimeout(()=>beep(f,0.15,'square',0.15),i*100)); }
  function sfxFireball() { const c=getAudioCtx(),o=c.createOscillator(),g=c.createGain(); o.type='sawtooth'; o.frequency.setValueAtTime(900,c.currentTime); o.frequency.exponentialRampToValueAtTime(150,c.currentTime+0.15); g.gain.setValueAtTime(0.15,c.currentTime); g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.15); o.connect(g); g.connect(c.destination); o.start(c.currentTime); o.stop(c.currentTime+0.15); }
  function sfxPipe() { const c=getAudioCtx(),o=c.createOscillator(),g=c.createGain(); o.type='square'; o.frequency.setValueAtTime(500,c.currentTime); o.frequency.exponentialRampToValueAtTime(100,c.currentTime+0.2); o.frequency.exponentialRampToValueAtTime(400,c.currentTime+0.4); g.gain.setValueAtTime(0.15,c.currentTime); g.gain.linearRampToValueAtTime(0.15,c.currentTime+0.3); g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.4); o.connect(g); g.connect(c.destination); o.start(c.currentTime); o.stop(c.currentTime+0.4); }
  function sfx1Up() { [659,784,988,784,988,1319].forEach((f,i)=>setTimeout(()=>beep(f,0.1,'square',0.18),i*80)); }
  function sfxSelect() { beep(660,0.05,'square',0.12); }
  function sfxWarning() { beep(440,0.15,'square',0.2); setTimeout(()=>beep(440,0.15,'square',0.2),250); setTimeout(()=>beep(440,0.15,'square',0.2),500); }
  function sfxExplosion() { const c=getAudioCtx(); const bs=c.sampleRate*0.4; const buf=c.createBuffer(1,bs,c.sampleRate); const d=buf.getChannelData(0); for(let i=0;i<bs;i++)d[i]=Math.random()*2-1; const n=c.createBufferSource(); n.buffer=buf; const g=c.createGain(); g.gain.setValueAtTime(0.3,c.currentTime); g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.4); const f=c.createBiquadFilter(); f.type='lowpass'; f.frequency.setValueAtTime(1000,c.currentTime); f.frequency.exponentialRampToValueAtTime(100,c.currentTime+0.4); n.connect(f); f.connect(g); g.connect(c.destination); n.start(c.currentTime); n.stop(c.currentTime+0.4); }
  function sfxLaser() { const c=getAudioCtx(),o=c.createOscillator(),g=c.createGain(); o.type='sawtooth'; o.frequency.setValueAtTime(1500,c.currentTime); o.frequency.exponentialRampToValueAtTime(200,c.currentTime+0.2); g.gain.setValueAtTime(0.15,c.currentTime); g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.2); o.connect(g); g.connect(c.destination); o.start(c.currentTime); o.stop(c.currentTime+0.2); }
  function sfxSuccess() { beep(523,0.15,'sine',0.2); setTimeout(()=>beep(659,0.15,'sine',0.2),100); setTimeout(()=>beep(784,0.3,'sine',0.2),200); }
  function sfxError() { beep(200,0.3,'square',0.15); }
  function sfxLevelUp() { [523,659,784,1047].forEach((f,i)=>setTimeout(()=>beep(f,0.2,'sine',0.2),i*120)); }

  const SFX_MAP = { jump:sfxJump, coin:sfxCoin, powerup:sfxPowerUp, power_up:sfxPowerUp, death:sfxDeath, fireball:sfxFireball, pipe:sfxPipe, '1up':sfx1Up, oneup:sfx1Up, select:sfxSelect, warning:sfxWarning, explosion:sfxExplosion, laser:sfxLaser, success:sfxSuccess, error:sfxError, levelup:sfxLevelUp, level_up:sfxLevelUp };
  function playSfx(name) { const fn = SFX_MAP[name?.toLowerCase()]; if (fn) fn(); }

  // BGM 시스템
  let currentBgm = null;
  const BGM_PATTERNS = {
    adventure: { notes:['C4','E4','G4','C5','B4','G4','E4','G4','A4','C5','E5','A4','G4','E4','C4','E4','F4','A4','C5','F4','E4','C4','A3','C4','G4','B4','D5','G4','F4','D4','B3','D4'], durations:[0.15,0.15,0.15,0.3,0.15,0.15,0.15,0.3,0.15,0.15,0.15,0.3,0.15,0.15,0.15,0.3,0.15,0.15,0.15,0.3,0.15,0.15,0.15,0.3,0.15,0.15,0.15,0.3,0.15,0.15,0.15,0.3], type:'square', volume:0.12 },
    explore: { notes:['E4','G4','A4','B4','E4','G4','A4','G4','D4','F#4','A4','D5','D4','F#4','A4','F#4','C4','E4','G4','C5','C4','E4','G4','E4','B3','D#4','F#4','B4','B3','D#4','F#4','D#4'], durations:[0.2,0.2,0.2,0.4,0.2,0.2,0.2,0.4,0.2,0.2,0.2,0.4,0.2,0.2,0.2,0.4,0.2,0.2,0.2,0.4,0.2,0.2,0.2,0.4,0.2,0.2,0.2,0.4,0.2,0.2,0.2,0.4], type:'triangle', volume:0.1 },
    battle: { notes:['A4','A4','C5','A4','D5','C5','A4','A4','G4','G4','Bb4','G4','C5','Bb4','G4','G4','F4','F4','A4','F4','C5','A4','F4','F4','E4','E4','G4','E4','B4','G4','E4','E4'], durations:[0.1,0.1,0.1,0.1,0.15,0.1,0.1,0.15,0.1,0.1,0.1,0.1,0.15,0.1,0.1,0.15,0.1,0.1,0.1,0.1,0.15,0.1,0.1,0.15,0.1,0.1,0.1,0.1,0.15,0.1,0.1,0.15], type:'square', volume:0.12 },
    peaceful: { notes:['C4','E4','G4','C5','G4','E4','F4','A4','C5','F5','C5','A4','G4','B4','D5','G5','D5','B4','C4','E4','G4','C5','G4','E4'], durations:[0.3,0.3,0.3,0.3,0.3,0.3,0.3,0.3,0.3,0.3,0.3,0.3,0.3,0.3,0.3,0.3,0.3,0.3,0.3,0.3,0.3,0.3,0.3,0.3], type:'sine', volume:0.1 },
    victory: { notes:['C5','C5','C5','C5','Ab4','Bb4','C5','Bb4','C5','E5','E5','E5','E5','C5','D5','E5','D5','E5','G5','G5','F5','E5','D5','C5','D5','E5','C5'], durations:[0.12,0.12,0.12,0.35,0.12,0.12,0.12,0.12,0.45,0.12,0.12,0.12,0.35,0.12,0.12,0.12,0.12,0.45,0.12,0.12,0.12,0.12,0.12,0.12,0.12,0.12,0.6], type:'square', volume:0.15 },
  };

  function startBgm(name, loop) {
    stopBgm();
    const pattern = BGM_PATTERNS[name?.toLowerCase()];
    if (!pattern) return;
    let running = true, timeoutIds = [];
    function playPattern() {
      if (!running) return;
      let delay = 0;
      for (let i = 0; i < pattern.notes.length; i++) {
        const freq = noteToFreq(pattern.notes[i]);
        const dur = pattern.durations[i] || 0.2;
        if (freq) { const d=delay; const tid=setTimeout(()=>{ if(running) beep(freq,dur*0.9,pattern.type,pattern.volume); },d); timeoutIds.push(tid); }
        delay += dur * 1000;
      }
      if (loop !== false) { const tid=setTimeout(()=>{ if(running) playPattern(); },delay); timeoutIds.push(tid); }
    }
    currentBgm = { name, stop:()=>{ running=false; timeoutIds.forEach(id=>clearTimeout(id)); timeoutIds=[]; } };
    playPattern();
  }

  function stopBgm() {
    if (currentBgm) { currentBgm.stop(); currentBgm = null; }
  }

  // 사운드 커맨드 처리
  function processSoundCmd(cmd) {
    switch (cmd.method) {
      case 'beep': beep(cmd.frequency||440, cmd.duration||0.3, cmd.type||'sine', cmd.volume||0.3); break;
      case 'note': playNote(cmd.name, cmd.duration||0.5, cmd.type||'sine', cmd.volume||0.4); break;
      case 'chord': playChord(cmd.frequencies||[], cmd.duration||1.0, cmd.type||'sine', cmd.volume||0.25); break;
      case 'sequence': playSequence(cmd.notes||[]); break;
      case 'sfx': playSfx(cmd.name); break;
      case 'bgm_start': startBgm(cmd.name, cmd.loop); break;
      case 'bgm_stop': stopBgm(); break;
    }
  }

  // === 차트 시스템 (Three.js 네이티브 3D) ===
  function lerp(a,b,t) { return a+(b-a)*t; }
  function interpolateStops(stops,t) {
    t=Math.max(0,Math.min(1,t));
    if(t<=stops[0][0]) return [stops[0][1],stops[0][2],stops[0][3]];
    if(t>=stops[stops.length-1][0]) return [stops[stops.length-1][1],stops[stops.length-1][2],stops[stops.length-1][3]];
    for(let i=0;i<stops.length-1;i++) {
      if(t>=stops[i][0]&&t<=stops[i+1][0]) {
        const l=(t-stops[i][0])/(stops[i+1][0]-stops[i][0]);
        return [lerp(stops[i][1],stops[i+1][1],l),lerp(stops[i][2],stops[i+1][2],l),lerp(stops[i][3],stops[i+1][3],l)];
      }
    }
    return [stops[0][1],stops[0][2],stops[0][3]];
  }
  const COLORMAPS = {
    viridis: t=>interpolateStops([[0,0.267,0.004,0.329],[0.25,0.282,0.14,0.458],[0.5,0.127,0.566,0.551],[0.75,0.544,0.773,0.247],[1,0.993,0.906,0.144]],t),
    plasma: t=>interpolateStops([[0,0.05,0.03,0.53],[0.25,0.494,0.012,0.658],[0.5,0.798,0.28,0.47],[0.75,0.973,0.585,0.253],[1,0.94,0.975,0.131]],t),
    rainbow: t=>interpolateStops([[0,1,0,0],[0.167,1,0.5,0],[0.333,1,1,0],[0.5,0,1,0],[0.667,0,1,1],[0.833,0,0,1],[1,0.6,0,1]],t),
    coolwarm: t=>interpolateStops([[0,0.23,0.3,0.75],[0.5,0.97,0.97,0.97],[1,0.71,0.015,0.15]],t),
    ocean: t=>interpolateStops([[0,0,0.07,0.28],[0.33,0,0.27,0.53],[0.67,0,0.69,0.76],[1,0.32,0.87,0.46]],t),
  };
  function getColormap(name) { return COLORMAPS[name] || COLORMAPS.rainbow; }

  const chartObjects = [];
  function clearCharts() {
    chartObjects.forEach(o => { scene.remove(o); if(o.geometry)o.geometry.dispose(); if(o.material){if(Array.isArray(o.material))o.material.forEach(m=>m.dispose());else o.material.dispose();} });
    chartObjects.length = 0;
  }
  function tagChart(m) { chartObjects.push(m); return m; }

  function renderChart(cmd) {
    clearCharts();
    switch(cmd.chart_type) {
      case 'scatter3d': {
        const pts=cmd.points||[]; if(!pts.length)return;
        const r=cmd.size??0.08, op=cmd.opacity??0.9, cmap=getColormap(cmd.colormap||'rainbow');
        let zMin=Infinity,zMax=-Infinity;
        for(const p of pts){if(p[2]<zMin)zMin=p[2];if(p[2]>zMax)zMax=p[2];}
        const zRange=zMax-zMin||1;
        const geo=new THREE.SphereGeometry(r,16,12);
        const mat=new THREE.MeshStandardMaterial({roughness:0.3,metalness:0.15,transparent:op<1,opacity:op,emissive:new THREE.Color(0.05,0.05,0.1),emissiveIntensity:0.4});
        const mesh=new THREE.InstancedMesh(geo,mat,pts.length);
        const dummy=new THREE.Object3D(), col=new THREE.Color();
        for(let i=0;i<pts.length;i++){
          dummy.position.set(pts[i][0],pts[i][1],pts[i][2]); dummy.updateMatrix(); mesh.setMatrixAt(i,dummy.matrix);
          if(cmd.colors&&cmd.colors[i]){const c=cmd.colors[i];col.setRGB(c[0],c[1],c[2]);}
          else{const t=(pts[i][2]-zMin)/zRange;const[cr,cg,cb]=cmap(t);col.setRGB(cr,cg,cb);}
          mesh.setColorAt(i,col);
        }
        mesh.instanceMatrix.needsUpdate=true; if(mesh.instanceColor)mesh.instanceColor.needsUpdate=true;
        tagChart(mesh); scene.add(mesh); break;
      }
      case 'surface3d': {
        const zData=cmd.z_data||[]; if(!zData.length)return;
        const rows=zData.length, cols=zData[0].length;
        const xR=cmd.x_range||[-5,5], yR=cmd.y_range||[-5,5];
        const op=cmd.opacity??0.85, cmap=getColormap(cmd.colormap||'viridis');
        let zMin=Infinity,zMax=-Infinity;
        for(let i=0;i<rows;i++)for(let j=0;j<cols;j++){const z=zData[i][j];if(z<zMin)zMin=z;if(z>zMax)zMax=z;}
        const zRange=zMax-zMin||1;
        const geo=new THREE.PlaneGeometry(xR[1]-xR[0],yR[1]-yR[0],cols-1,rows-1);
        const pos=geo.attributes.position, vc=pos.count, colors=new Float32Array(vc*3);
        for(let i=0;i<rows;i++)for(let j=0;j<cols;j++){
          const idx=i*cols+j, z=zData[i][j]; pos.setZ(idx,z);
          const t=(z-zMin)/zRange;const[cr,cg,cb]=cmap(t); colors[idx*3]=cr;colors[idx*3+1]=cg;colors[idx*3+2]=cb;
        }
        geo.setAttribute('color',new THREE.Float32BufferAttribute(colors,3)); geo.computeVertexNormals();
        const mat=new THREE.MeshStandardMaterial({vertexColors:true,side:THREE.DoubleSide,roughness:0.35,metalness:0.1,transparent:op<1,opacity:op,emissive:new THREE.Color(0.02,0.02,0.05),emissiveIntensity:0.3});
        const m=new THREE.Mesh(geo,mat); m.rotation.x=-Math.PI/2; m.position.set((xR[0]+xR[1])/2,0,(yR[0]+yR[1])/2);
        tagChart(m); scene.add(m);
        if(cmd.wireframe!==false){const wm=new THREE.MeshBasicMaterial({color:0x111122,wireframe:true,transparent:true,opacity:0.12}); const wMesh=new THREE.Mesh(geo.clone(),wm); wMesh.rotation.x=-Math.PI/2; wMesh.position.copy(m.position); tagChart(wMesh); scene.add(wMesh);}
        break;
      }
      case 'line3d': {
        const pts=cmd.points||[]; if(pts.length<2)return;
        const lc=cmd.color||[0,0.8,1], tr=cmd.width??0.03;
        const curvePoints=pts.map(p=>new THREE.Vector3(p[0],p[1],p[2]));
        const curve=new THREE.CatmullRomCurve3(curvePoints,false,'centripetal');
        const geo=new THREE.TubeGeometry(curve,Math.max(pts.length*8,64),tr,8,false);
        const c=new THREE.Color(lc[0],lc[1],lc[2]);
        const mat=new THREE.MeshStandardMaterial({color:c,roughness:0.25,metalness:0.2,emissive:c.clone().multiplyScalar(0.35),emissiveIntensity:0.6});
        const m=new THREE.Mesh(geo,mat); tagChart(m); scene.add(m); break;
      }
      case 'bar3d': {
        const vals=cmd.values||[]; if(!vals.length)return;
        const bw=cmd.bar_width??0.6, cmap=getColormap(cmd.colormap||'plasma');
        let vMin=Infinity,vMax=-Infinity;
        for(const v of vals){if(v<vMin)vMin=v;if(v>vMax)vMax=v;}
        const vRange=vMax-vMin||1, sp=bw*1.4;
        for(let i=0;i<vals.length;i++){
          const h=vals[i],geo=new THREE.BoxGeometry(bw,Math.abs(h),bw);
          let cr,cg,cb;
          if(cmd.colors&&cmd.colors[i])[cr,cg,cb]=cmd.colors[i]; else{const t=(h-vMin)/vRange;[cr,cg,cb]=cmap(t);}
          const c=new THREE.Color(cr,cg,cb);
          const mat=new THREE.MeshStandardMaterial({color:c,roughness:0.3,metalness:0.15,emissive:c.clone().multiplyScalar(0.2),emissiveIntensity:0.4});
          const m=new THREE.Mesh(geo,mat); m.position.set((i-(vals.length-1)/2)*sp,Math.abs(h)/2,0); tagChart(m); scene.add(m);
        }
        break;
      }
    }
    // 축 & 그리드
    if(cmd.show_axes!==false){
      const gs=10,gd=20;
      const grid=new THREE.GridHelper(gs,gd,0x444466,0x333355); grid.material.opacity=0.15; grid.material.transparent=true; tagChart(grid); scene.add(grid);
      const al=gs/2;
      [[1,0,0,0.9,0.2,0.2],[0,1,0,0.2,0.9,0.2],[0,0,1,0.2,0.2,0.9]].forEach(([dx,dy,dz,r,g,b])=>{
        const pts=[new THREE.Vector3(0,0,0),new THREE.Vector3(dx*al,dy*al,dz*al)];
        const geo=new THREE.BufferGeometry().setFromPoints(pts);
        const mat=new THREE.LineBasicMaterial({color:new THREE.Color(r,g,b),transparent:true,opacity:0.6});
        const line=new THREE.Line(geo,mat); tagChart(line); scene.add(line);
      });
    }
  }

  // === 브릿지: JSON 커맨드 → Three.js ===
  const meshes = new Map();
  const trails = new Map();
  const curves = new Map();   // curve/points 동적 라인
  function toColor(arr) { return new THREE.Color(arr[0], arr[1], arr[2]); }

  function createTrail(cmd) {
    const trailColor = cmd.trail_color ? toColor(cmd.trail_color) : toColor(cmd.color || [1,1,1]);
    const trailMat = new THREE.LineBasicMaterial({ color: trailColor });
    const trailGeo = new THREE.BufferGeometry();
    const positions = [];
    if (cmd.pos) positions.push(cmd.pos[0], cmd.pos[1], cmd.pos[2]);
    trailGeo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
    const trailLine = new THREE.Line(trailGeo, trailMat);
    scene.add(trailLine);
    trails.set(cmd.id, { line: trailLine, positions, maxPoints: 10000 });
  }

  function updateTrail(cmd) {
    const trail = trails.get(cmd.id);
    if (!trail) return;
    trail.positions.push(cmd.pos[0], cmd.pos[1], cmd.pos[2]);
    if (trail.positions.length > trail.maxPoints * 3) trail.positions.splice(0, 3);
    trail.line.geometry.setAttribute('position', new THREE.Float32BufferAttribute(trail.positions, 3));
    trail.line.geometry.computeBoundingSphere();
  }

  function cloneColor(color) {
    return typeof color?.clone === 'function'
      ? color.clone()
      : new THREE.Color(color?.r ?? 0, color?.g ?? 0, color?.b ?? 0);
  }

  function setMaterialEmissive(material, enabled) {
    if (!material || !('emissive' in material)) return;
    material.emissive = enabled ? cloneColor(material.color) : new THREE.Color(0, 0, 0);
    material.emissiveIntensity = enabled ? 0.8 : 0;
    material.needsUpdate = true;
  }

  function updateMaterialColor(material, color) {
    if (!material) return;
    material.color = color;
    if ('emissiveIntensity' in material && material.emissiveIntensity > 0) {
      material.emissive = cloneColor(color);
    }
  }

  function processCmd(cmd) {
    if (cmd.action === 'create') {
      let mesh;
      const baseColor = toColor(cmd.color || [1,1,1]);
      const mat = new THREE.MeshStandardMaterial({
        color: baseColor, roughness: 0.4, metalness: 0.1,
        emissive: cmd.emissive ? cloneColor(baseColor) : new THREE.Color(0,0,0),
        emissiveIntensity: cmd.emissive ? 0.8 : 0,
        transparent: (cmd.opacity ?? 1) < 1, opacity: cmd.opacity ?? 1,
      });
      switch (cmd.type) {
        case 'sphere': mesh = new THREE.Mesh(new THREE.SphereGeometry(cmd.radius || 0.5, 32, 16), mat); break;
        case 'box': { const s = cmd.size || [1,1,1]; mesh = new THREE.Mesh(new THREE.BoxGeometry(s[0],s[1],s[2]), mat); break; }
        case 'cylinder': {
          const r = cmd.radius||0.5; const a = cmd.axis||[1,0,0]; const l = Math.hypot(...a)||1;
          mesh = new THREE.Mesh(new THREE.CylinderGeometry(r,r,l,32), mat);
          const dir = new THREE.Vector3(...a).normalize();
          mesh.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), dir);
          break;
        }
        case 'arrow': {
          const a = cmd.axis||[1,0,0]; const l = Math.hypot(...a)||1; const sw = cmd.shaftwidth||0.1;
          const group = new THREE.Group();
          const shaft = new THREE.Mesh(new THREE.CylinderGeometry(sw/2,sw/2,l*0.8,8), mat);
          shaft.position.y = l*0.4; group.add(shaft);
          const head = new THREE.Mesh(new THREE.ConeGeometry(sw*1.5,l*0.2,8), mat);
          head.position.y = l*0.9; group.add(head);
          const dir = new THREE.Vector3(...a).normalize();
          group.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), dir);
          mesh = group; break;
        }
        case 'cone': {
          const r = cmd.radius||0.5; const a = cmd.axis||[1,0,0]; const l = Math.hypot(...a)||1;
          mesh = new THREE.Mesh(new THREE.ConeGeometry(r,l,32), mat);
          const dir = new THREE.Vector3(...a).normalize();
          mesh.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), dir);
          break;
        }
        case 'ring': mesh = new THREE.Mesh(new THREE.TorusGeometry(cmd.radius||1, cmd.thickness||0.1, 16, 48), mat); break;
        case 'pyramid': {
          const sz = cmd.size || [1,1,1]; const a = cmd.axis||[1,0,0];
          const baseR = Math.max(sz[1], sz[2])/2 || 0.5;
          mesh = new THREE.Mesh(new THREE.ConeGeometry(baseR, sz[0]||1, 4), mat);
          mesh.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), new THREE.Vector3(...a).normalize());
          break;
        }
        case 'ellipsoid': {
          const sz = cmd.size || [1,1,1];
          mesh = new THREE.Mesh(new THREE.SphereGeometry(0.5, 32, 16), mat);
          mesh.scale.set(sz[0], sz[1], sz[2]);
          break;
        }
        case 'helix': {
          const r = cmd.radius||1; const a = cmd.axis||[1,0,0]; const len = cmd.length ?? 1;
          const coils = cmd.coils||5; const seg = Math.max(64, coils*32);
          const positions = [];
          for (let i=0;i<=seg;i++){const t=i/seg;const ang=t*coils*Math.PI*2;positions.push(t*len, r*Math.cos(ang), r*Math.sin(ang));}
          const g = new THREE.BufferGeometry();
          g.setAttribute('position', new THREE.Float32BufferAttribute(positions,3));
          mesh = new THREE.Line(g, new THREE.LineBasicMaterial({color: baseColor, transparent:(cmd.opacity??1)<1, opacity:cmd.opacity??1}));
          mesh.quaternion.setFromUnitVectors(new THREE.Vector3(1,0,0), new THREE.Vector3(...a).normalize());
          break;
        }
        case 'label': {
          // 캔버스 텍스처 → Sprite (항상 카메라를 향함)
          const text = String(cmd.text||''); const fontPx = cmd.height||16;
          const measure = document.createElement('canvas').getContext('2d');
          measure.font = (fontPx*2) + 'px sans-serif';
          const tw = Math.max(32, Math.ceil(measure.measureText(text||' ').width)+12);
          const th = Math.max(32, Math.ceil(fontPx*2*1.4)+12);
          const cv = document.createElement('canvas'); cv.width=tw; cv.height=th;
          const ctx = cv.getContext('2d');
          if (cmd.background) { const c=cmd.background; ctx.fillStyle = 'rgba('+Math.round(c[0]*255)+','+Math.round(c[1]*255)+','+Math.round(c[2]*255)+',0.85)'; ctx.fillRect(0,0,tw,th); }
          const c = cmd.color||[1,1,1];
          ctx.fillStyle = 'rgb('+Math.round(c[0]*255)+','+Math.round(c[1]*255)+','+Math.round(c[2]*255)+')';
          ctx.font = (fontPx*2) + 'px sans-serif';
          ctx.textBaseline='middle'; ctx.textAlign='center';
          ctx.fillText(text, tw/2, th/2);
          const tex = new THREE.CanvasTexture(cv);
          const sm = new THREE.SpriteMaterial({map:tex, transparent:true, opacity:cmd.opacity??1, depthTest:false, depthWrite:false});
          mesh = new THREE.Sprite(sm);
          const ws = fontPx/32;
          mesh.scale.set((tw/th)*ws, ws, 1);
          break;
        }
        case 'curve': {
          const pts = (cmd.points||[]).flat();
          const g = new THREE.BufferGeometry();
          g.setAttribute('position', new THREE.Float32BufferAttribute(pts,3));
          mesh = new THREE.Line(g, new THREE.LineBasicMaterial({color: baseColor, transparent:(cmd.opacity??1)<1, opacity:cmd.opacity??1}));
          curves.set(cmd.id, {line: mesh, positions: pts.slice()});
          break;
        }
        case 'points': {
          const pts = (cmd.points||[]).flat();
          const g = new THREE.BufferGeometry();
          g.setAttribute('position', new THREE.Float32BufferAttribute(pts,3));
          mesh = new THREE.Points(g, new THREE.PointsMaterial({color: baseColor, size:(cmd.size??5)*0.02, sizeAttenuation:true, transparent:(cmd.opacity??1)<1, opacity:cmd.opacity??1}));
          curves.set(cmd.id, {line: mesh, positions: pts.slice()});
          break;
        }
        case 'triangle':
        case 'quad': {
          const verts = cmd.vertices || [];
          const positions = []; const colors = [];
          const indices = cmd.type === 'triangle' ? [0,1,2] : [0,1,2,0,2,3];
          for (const i of indices) {
            const v = verts[i] || {pos:[0,0,0], color:[1,1,1]};
            positions.push(v.pos[0], v.pos[1], v.pos[2]);
            colors.push(v.color[0], v.color[1], v.color[2]);
          }
          const g = new THREE.BufferGeometry();
          g.setAttribute('position', new THREE.Float32BufferAttribute(positions,3));
          g.setAttribute('color', new THREE.Float32BufferAttribute(colors,3));
          g.computeVertexNormals();
          mesh = new THREE.Mesh(g, new THREE.MeshStandardMaterial({vertexColors:true, side:THREE.DoubleSide, roughness:0.5, metalness:0.05}));
          break;
        }
        case 'extrusion': {
          const path = cmd.path || []; const shape = cmd.shape || [];
          if (path.length >= 2 && shape.length >= 3) {
            const sh = new THREE.Shape();
            sh.moveTo(shape[0][0], shape[0][1]);
            for (let i=1;i<shape.length;i++) sh.lineTo(shape[i][0], shape[i][1]);
            sh.closePath();
            const cv = new THREE.CatmullRomCurve3(path.map(p => new THREE.Vector3(p[0], p[1], p[2]??0)));
            mesh = new THREE.Mesh(new THREE.ExtrudeGeometry(sh, {steps: Math.max(path.length*4,12), extrudePath: cv}), mat);
          } else {
            mesh = new THREE.Mesh(new THREE.BoxGeometry(1,1,1), mat);
          }
          break;
        }
        case 'local_light': {
          const lt = new THREE.PointLight(toColor(cmd.color||[1,1,1]), cmd.intensity??1, 50);
          if(cmd.pos) lt.position.set(...cmd.pos); scene.add(lt); meshes.set(cmd.id, lt); return;
        }
        case 'distant_light': {
          const lt = new THREE.DirectionalLight(toColor(cmd.color||[1,1,1]), cmd.intensity??1);
          const d=cmd.direction||[0,-1,0]; lt.position.set(-d[0]*10,-d[1]*10,-d[2]*10);
          scene.add(lt); meshes.set(cmd.id, lt); return;
        }
        default: return;
      }
      if (cmd.pos) mesh.position.set(cmd.pos[0], cmd.pos[1], cmd.pos[2]);
      mesh.visible = cmd.visible !== false;
      scene.add(mesh);
      meshes.set(cmd.id, mesh);
      if (cmd.make_trail) createTrail(cmd);
    } else if (cmd.action === 'update') {
      const m = meshes.get(cmd.id); if (!m) return;
      if (cmd.pos) m.position.set(cmd.pos[0], cmd.pos[1], cmd.pos[2]);
      if (cmd.color) {
        if (m.isLight) m.color = toColor(cmd.color);
        else if (m.isGroup) m.traverse(c => { if(c.material) updateMaterialColor(c.material, toColor(cmd.color)); });
        else if (m.material) updateMaterialColor(m.material, toColor(cmd.color));
      }
      if (cmd.intensity !== undefined && m.isLight) m.intensity = cmd.intensity;
      if (cmd.direction !== undefined && m.isDirectionalLight) m.position.set(-cmd.direction[0]*10,-cmd.direction[1]*10,-cmd.direction[2]*10);
      if (cmd.visible !== undefined) m.visible = cmd.visible;
      if (cmd.opacity !== undefined) {
        if (m.isGroup) m.traverse(c => { if(c.material){c.material.opacity=cmd.opacity;c.material.transparent=cmd.opacity<1;} });
        else if (m.material) { m.material.opacity=cmd.opacity; m.material.transparent=cmd.opacity<1; }
      }
      if (cmd.emissive !== undefined && !m.isLight) {
        if (m.isGroup) m.traverse(c => { if(c.material) setMaterialEmissive(c.material, cmd.emissive); });
        else if (m.material) setMaterialEmissive(m.material, cmd.emissive);
      }
      if (cmd.radius !== undefined && m.geometry) {
        let ng;
        if(m.geometry.type==='SphereGeometry') ng=new THREE.SphereGeometry(cmd.radius,32,16);
        else if(m.geometry.type==='ConeGeometry') ng=new THREE.ConeGeometry(cmd.radius,m.geometry.parameters?.height||1,32);
        else if(m.geometry.type==='CylinderGeometry') ng=new THREE.CylinderGeometry(cmd.radius,cmd.radius,m.geometry.parameters?.height||1,32);
        else if(m.geometry.type==='TorusGeometry') ng=new THREE.TorusGeometry(cmd.radius,m.geometry.parameters?.tube||0.1,16,48);
        if(ng){m.geometry.dispose();m.geometry=ng;}
      }
      if (cmd.size !== undefined && m.geometry) { const s=cmd.size; const ng=new THREE.BoxGeometry(s[0],s[1],s[2]); m.geometry.dispose(); m.geometry=ng; }
      if (cmd.thickness !== undefined && m.geometry?.type==='TorusGeometry') { const r=m.geometry.parameters?.radius||1; const ng=new THREE.TorusGeometry(r,cmd.thickness,16,48); m.geometry.dispose(); m.geometry=ng; }
      if (cmd.axis !== undefined) { const dir=new THREE.Vector3(...cmd.axis).normalize(); m.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0),dir); }
    } else if (cmd.action === 'scene' && cmd.property === 'background') {
      scene.background = toColor(cmd.value);
    } else if (cmd.action === 'trail_update') {
      updateTrail(cmd);
    } else if (cmd.action === 'trail_clear') {
      const t = trails.get(cmd.id);
      if (t) { t.positions.length = 0; t.line.geometry.setAttribute('position', new THREE.Float32BufferAttribute([], 3)); t.line.geometry.computeBoundingSphere(); }
    } else if (cmd.action === 'trail_attach') {
      if (!trails.has(cmd.id) && meshes.has(cmd.id)) createTrail({id:cmd.id, pos: cmd.pos||[0,0,0], color:[1,1,1], trail_color: cmd.trail_color});
    } else if (cmd.action === 'curve_append') {
      const c = curves.get(cmd.id);
      if (c) { c.positions.push(cmd.pos[0], cmd.pos[1], cmd.pos[2]); c.line.geometry.setAttribute('position', new THREE.Float32BufferAttribute(c.positions, 3)); c.line.geometry.computeBoundingSphere(); }
    } else if (cmd.action === 'curve_clear') {
      const c = curves.get(cmd.id);
      if (c) { c.positions.length = 0; c.line.geometry.setAttribute('position', new THREE.Float32BufferAttribute([], 3)); c.line.geometry.computeBoundingSphere(); }
    } else if (cmd.action === 'compound') {
      const group = new THREE.Group();
      for (const subId of (cmd.sub_ids||[])) {
        const subMesh = meshes.get(subId);
        if (subMesh) { scene.remove(subMesh); group.add(subMesh); }
      }
      if (cmd.pos) group.position.set(cmd.pos[0], cmd.pos[1], cmd.pos[2]);
      if (cmd.color) group.traverse(c => { if(c.material) c.material.color = toColor(cmd.color); });
      if (cmd.opacity !== undefined && cmd.opacity < 1) group.traverse(c => { if(c.material){c.material.opacity=cmd.opacity;c.material.transparent=true;} });
      group.visible = cmd.visible !== false;
      scene.add(group);
      meshes.set(cmd.id, group);
      if (cmd.make_trail) createTrail(cmd);
    } else if (cmd.action === 'sound') {
      processSoundCmd(cmd);
    } else if (cmd.action === 'chart') {
      renderChart(cmd);
    }
  }

  // === Pyodide 직접 로드 + 실행 ===
  const progress = document.getElementById('progress');
  const loading = document.getElementById('loading');

  async function run() {
    progress.style.width = '20%';
    const pyodideScript = document.createElement('script');
    pyodideScript.src = 'https://cdn.jsdelivr.net/pyodide/v0.27.0/full/pyodide.js';
    document.head.appendChild(pyodideScript);

    await new Promise(r => pyodideScript.onload = r);
    progress.style.width = '50%';

    const pyodide = await loadPyodide({ indexURL: 'https://cdn.jsdelivr.net/pyodide/v0.27.0/full/' });

# === vector 클래스 ===
class vector:
    def __init__(self, x=0, y=0, z=0):
        self.x = float(x); self.y = float(y); self.z = float(z)
    def __repr__(self): return f"<{self.x:.4g}, {self.y:.4g}, {self.z:.4g}>"
    def __add__(self, o): return vector(self.x+o.x, self.y+o.y, self.z+o.z)
    def __sub__(self, o): return vector(self.x-o.x, self.y-o.y, self.z-o.z)
    def __mul__(self, s):

    def __rmul__(self, s): return self.__mul__(s)
    def __truediv__(self, s): return vector(self.x/s, self.y/s, self.z/s)
    def __neg__(self): return vector(-self.x, -self.y, -self.z)
    def __eq__(self, o):
        if not isinstance(o, vector): return NotImplemented
        return self.x==o.x and self.y==o.y and self.z==o.z
    def __ne__(self, o):
        e = self.__eq__(o)
        return NotImplemented if e is NotImplemented else not e
    def __hash__(self): return hash((self.x, self.y, self.z))
    @property
    def mag(self): return (self.x**2 + self.y**2 + self.z**2)**0.5
    @property
    def mag2(self): return self.x**2 + self.y**2 + self.z**2
    @property
    def hat(self):
        m = self.mag
        return self/m if m else vector(0,0,0)
    def dot(self, o): return self.x*o.x + self.y*o.y + self.z*o.z
    def cross(self, o): return vector(self.y*o.z-self.z*o.y, self.z*o.x-self.x*o.z, self.x*o.y-self.y*o.x)
    def to_list(self): return [self.x, self.y, self.z]
    def clone(self): return vector(self.x, self.y, self.z)
    def proj(self, b): bh = b.hat; return bh * self.dot(bh)
    def comp(self, b): return self.dot(b.hat)
    def diff_angle(self, b):
        import math
        m1=self.mag; m2=b.mag
        if m1==0 or m2==0: return 0.0
        c = self.dot(b)/(m1*m2)
        if c>1.0: c=1.0
        elif c<-1.0: c=-1.0
        return math.acos(c)
    def rotate(self, angle, axis=None):
        import math
        if axis is None: axis = vector(0,0,1)
        k = axis.hat
        ca = math.cos(angle); sa = math.sin(angle)
        v = self
        return v*ca + k.cross(v)*sa + k*(k.dot(v)*(1-ca))

class _GObject:
    def __init__(self, obj_type, **kwargs):
        self._id = _new_id()
        self._type = obj_type
        self._make_trail = kwargs.pop('make_trail', False)
        self._trail_color = kwargs.pop('trail_color', None)
        self._pos = kwargs.get('pos', vector(0,0,0))
        self._color = kwargs.get('color', color.white)
        self._visible = kwargs.get('visible', True)
        self._opacity = kwargs.get('opacity', 1.0)
        self._emissive = kwargs.get('emissive', False)
        self._velocity = kwargs.get('velocity', vector(0,0,0))
        _add_command({
            "action":"create","id":self._id,"type":obj_type,
            "pos":self._pos.to_list(),"color":self._color.to_list(),
            "visible":self._visible,"opacity":self._opacity,
            "make_trail":self._make_trail,
            "trail_color":self._trail_color.to_list() if self._trail_color else None,
            **{k:v for k,v in kwargs.items() if k not in ('pos','color','visible','opacity','velocity') and isinstance(v,(int,float,bool,str))},
            **{k:v.to_list() for k,v in kwargs.items() if k not in ('pos','color','visible','opacity','velocity') and isinstance(v,vector)},
        })
    @property
    def pos(self): return self._pos
    @pos.setter
    def pos(self, v):
        self._pos = v
        _add_command({"action":"update","id":self._id,"pos":v.to_list()})
        if self._make_trail:
            _add_command({"action":"trail_update","id":self._id,"pos":v.to_list()})
    @property
    def color(self): return self._color
    @color.setter
    def color(self, v):
        self._color = v
        _add_command({"action":"update","id":self._id,"color":v.to_list()})
    @property
    def visible(self): return self._visible
    @visible.setter
    def visible(self, v):
        self._visible = v
        _add_command({"action":"update","id":self._id,"visible":v})
    @property
    def velocity(self): return self._velocity
    @velocity.setter
    def velocity(self, v): self._velocity = v
    @property
    def opacity(self): return self._opacity
    @opacity.setter
    def opacity(self, v):
        self._opacity = v
        _add_command({"action":"update","id":self._id,"opacity":v})
    @property
    def emissive(self): return self._emissive
    @emissive.setter
    def emissive(self, v):
        self._emissive = v
        _add_command({"action":"update","id":self._id,"emissive":v})

    # === v3 공통 메서드 ===
    def _clone_kwargs(self):
        return {
            'pos': self._pos.clone() if isinstance(self._pos, vector) else self._pos,
            'color': self._color.clone() if isinstance(self._color, vector) else self._color,
            'visible': self._visible, 'opacity': self._opacity, 'emissive': self._emissive,
        }
    def clone(self, **kwargs):
        args = self._clone_kwargs(); args.update(kwargs)
        return self.__class__(**args)
    def rotate(self, angle, axis=None, origin=None):
        if axis is None: axis = vector(0,1,0)
        if origin is None: origin = self._pos
        rel = self._pos - origin
        new_rel = rel.rotate(angle, axis=axis)
        self.pos = origin + new_rel
        if hasattr(self, '_axis') and isinstance(self._axis, vector):
            self.axis = self._axis.rotate(angle, axis=axis)
    def clear_trail(self):
        _add_command({"action":"trail_clear","id":self._id})
    def attach_trail(self, color=None, retain=10000):
        self._make_trail = True
        if color is not None: self._trail_color = color
        _add_command({"action":"trail_attach","id":self._id,
                      "trail_color": color.to_list() if isinstance(color, vector) else None,
                      "pos": self._pos.to_list(), "retain": int(retain)})

_KOREAN_NOTE_MAP = {
    '도':'C','레':'D','미':'E','파':'F','솔':'G','라':'A','시':'B',
    '도#':'C#','레#':'D#','파#':'F#','솔#':'G#','라#':'A#',
    '레b':'Db','미b':'Eb','솔b':'Gb','라b':'Ab','시b':'Bb',
}
def _resolve_note_name(name):
    if not name: return name
    for kr, en in _KOREAN_NOTE_MAP.items():
        if name.startswith(kr):
            rest = name[len(kr):]
            if not rest or not rest[0].isdigit(): rest = '4' + rest
            return en + rest
    if len(name)==1 and name[0] in 'ABCDEFG': return name+'4'
    if len(name)==2 and name[0] in 'ABCDEFG' and name[1] in '#b': return name+'4'
    return name

class NamedList(list):
    def __init__(self, items, name_map=None):
        super().__init__(items)
        self._name_map = name_map or {}
    def __getitem__(self, key):
        if isinstance(key, str):
            if key in self._name_map: return super().__getitem__(self._name_map[key])
            raise KeyError(f"'{key}' 이름을 찾을 수 없습니다")
        return super().__getitem__(key)

_INSTRUMENT_PRESETS = {
    'piano':{'type':'triangle','volume':0.35},'organ':{'type':'sine','volume':0.3},
    'guitar':{'type':'sawtooth','volume':0.2},'flute':{'type':'sine','volume':0.25},

_INSTRUMENT_KR = {'피아노':'piano','오르간':'organ','기타':'guitar','플루트':'flute','트럼펫':'trumpet','베이스':'bass','칩튠':'chiptune','신스':'synth'}

def _resolve_instrument(name):
    if not name: return _INSTRUMENT_PRESETS['piano']
    resolved = _INSTRUMENT_KR.get(name, name).lower()
    return _INSTRUMENT_PRESETS.get(resolved, _INSTRUMENT_PRESETS['piano'])

def play_instrument(instrument, name, duration=0.5, volume=None):
    preset = _resolve_instrument(instrument)
    vol = volume if volume is not None else preset['volume']
    resolved = _resolve_note_name(name)
    _add_command({"action":"sound","method":"note","name":resolved,"duration":duration,"type":preset['type'],"volume":vol})

async def 악기(instrument, name, duration=0.5, volume=None):
